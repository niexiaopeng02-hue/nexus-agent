name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexusagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexusagent_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGVECTOR_TEST_DATABASE_URL: postgresql+psycopg://nexus:nexus@localhost:5432/nexusagent_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest
      - run: PYTHONPATH=. python evals/run_eval.py
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run typecheck
      - run: npm run build
