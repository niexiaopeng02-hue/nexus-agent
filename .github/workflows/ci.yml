name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexusagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexusagent_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGVECTOR_TEST_DATABASE_URL: postgresql+psycopg://nexus:nexus@localhost:5432/nexusagent_test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Backend lint
        run: ruff check .
      - name: Backend unit tests
        run: pytest -m "not integration"
      - name: PostgreSQL integration tests
        run: pytest -m integration
      - name: Evaluation pipeline
        run: PYTHONPATH=. python evals/run_eval.py
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Frontend typecheck
        run: npm run typecheck
      - name: Frontend production build
        run: npm run build
